version: "3.9"

services:

  mariadb:
    image: mariadb:11
    container_name: college-db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - dsu-network

  frontend:
    build: .
    container_name: dsu_web
    restart: always
    env_file:
      - .env
    depends_on:
      - mariadb
    ports:
      - "3001:3000"
    networks:
      - dsu-network

volumes:
  db_data:

networks:
  dsu-network:
    driver: bridge
