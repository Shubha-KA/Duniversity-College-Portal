apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: duniversity-monitor
  namespace: monitoring
  labels: 
    release: monitoring
spec:
  selector:
    matchLabels:
      app: duniversity-app
  namespaceSelector:
    matchNames:
      - college-ns
  endpoints:
    - port: http
      path: /metrics
      interval: 15s