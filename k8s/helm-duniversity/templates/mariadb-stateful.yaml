apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.backend_app.name }}
  namespace: shubha-ns
spec:
  serviceName: mariadb
  replicas: {{ .Values.backend.replicaCount }}
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxUnavailable: 1
  #     maxSurge: 1
  selector:
    matchLabels:
      app: maria-db
  minReadySeconds: {{ .Values.backend.minReadySeconds }}

  template:
    metadata:
      labels:
        app: maria-db
    spec:
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}
      containers:
        - name: mariadb
          image: {{ .Values.db_image.name }}:{{ .Values.db_image.tag }}
          ports:
            - containerPort: 3306
          
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: MARIADB_ROOT_PASSWORD

            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: mariadb-config
                  key: DB_USER

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: DB_PASSWORD

          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql

            - name: mariadb-initdb
              mountPath: /docker-entrypoint-initdb.d

      volumes:
        - name: mariadb-initdb
          configMap:
            name: mariadb-init

  volumeClaimTemplates:
    - metadata:
        name : mariadb-data
      spec:
        accessModes: [ "ReadWriteMany" ]
        storageClassName: csi-standard
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: shubha-ns
spec:
  selector:
    app: maria-db
  ports:
    - port: 3306
      targetPort: 3306
      protocol: TCP
  clusterIP: None

  