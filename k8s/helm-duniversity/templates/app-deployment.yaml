apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}  #duniversity-deployment
  namespace: college-ns
  labels:
    app: duniversity-deploy
spec:
  replicas: {{ .Values.replicaCount }}
  strategy: 
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: duniversity-app
  template:
    metadata:
      labels:
        app: duniversity-app
    spec:
      containers:
        - name: duniversity-cont
          image: {{ .Values.image.repository }}: {{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.ports.containerPort }}

          resources:
            requests: 
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          
          # env:
          # - name: DB_HOST
          #   valueFrom:
          #     configMapKeyRef:
          #       name: mariadb-config
          #       key: DB_HOST

          # - name: DB_PORT
          #   valueFrom:
          #     configMapKeyRef:
          #       name: mariadb-config
          #       key: DB_PORT

          # - name: DB_USER
          #   valueFrom:
          #     configMapKeyRef:
          #       name: mariadb-config
          #       key: DB_USER

          # - name: DB_PASSWORD
          #   valueFrom:
          #     secretKeyRef:
          #       name: mariadb-secret
          #       key: DB_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: duniversity-service
  namespace: college-ns
  labels:
    app: duniversity-app
spec:
  selector:
    app: duniversity-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP

